apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        # Copy the plugin JAR into the shared providers volume
        - name: provider-installer
          image: ghcr.io/groundsgg/keycloak-minecraft:latest
          command: ["cp", "/keycloak-minecraft.jar", "/providers/keycloak-minecraft.jar"]
          volumeMounts:
            - name: providers
              mountPath: /providers

      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.4
          args: ["start"]
          env:
            # Minecraft IdP credentials — injected from Secret, not stored in DB
            - name: KC_SPI_IDENTITY_PROVIDER_MINECRAFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: minecraft-idp
                  key: client-id
            - name: KC_SPI_IDENTITY_PROVIDER_MINECRAFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: minecraft-idp
                  key: client-secret

            # Standard Keycloak config (adjust as needed)
            - name: KC_HOSTNAME
              value: "https://auth.example.com"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://postgres:5432/keycloak"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: password

          volumeMounts:
            - name: providers
              mountPath: /opt/keycloak/providers

      volumes:
        - name: providers
          emptyDir: {}
