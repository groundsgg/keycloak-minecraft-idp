name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "github.user=${{ github.actor }}"
            echo "github.token=${{ secrets.GITHUB_TOKEN }}"
          } > ~/.gradle/gradle.properties

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            version="$(./gradlew -q properties | awk -F': ' '/^version: /{print $2; exit}')"
            echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package and build release artifact
        run: ./gradlew publish -PversionOverride="${{ steps.version.outputs.VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: |
            build/libs/keycloak-minecraft-idp.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
