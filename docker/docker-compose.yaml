services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    environment:
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Development mode settings
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: DEBUG
      # Database (using embedded H2 for development)
      KC_DB: dev-file
    volumes:
      # Mount the locally built provider JAR into Keycloak
      - ../build/libs/keycloak-minecraft-idp.jar:/opt/keycloak/providers/keycloak-minecraft-idp.jar:ro
      # Persist H2 database
      - keycloak-data:/opt/keycloak/data
    ports:
      - "8080:8080"
    entrypoint: ["/bin/sh", "-c"]
    command: ["/opt/keycloak/bin/kc.sh build && exec /opt/keycloak/bin/kc.sh start-dev"]

volumes:
  keycloak-data:
